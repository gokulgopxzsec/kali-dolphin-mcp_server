version: '3.9'

services:
  fastapi-app:
    build: .
    container_name: kali-mcp-api
    ports:
      - '8000:8000'
    volumes:
      - ./:/app
    depends_on:
      - chromadb
      - redis
      - postgres

  chromadb:
    image: chromadb/chroma
    container_name: chromadb
    ports:
      - '8001:8000'

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - '6379:6379'

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: kali
      POSTGRES_PASSWORD: kali
      POSTGRES_DB: kali_mcp
    ports:
      - '5432:5432'
